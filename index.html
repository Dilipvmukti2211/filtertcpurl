<!DOCTYPE html>
<html>

<head>

<title>UUID Finder Dashboard</title>

<style>

body{
background:#020617;
color:#e5e7eb;
font-family:Arial;
padding:40px;
}

input,textarea{
padding:10px;
width:420px;
margin:6px;
border-radius:6px;
}

button{
padding:10px 18px;
background:#38bdf8;
border:none;
cursor:pointer;
font-weight:bold;
margin:5px;
}

table{
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #1e293b;
padding:8px 12px;
}

th{
background:#0f172a;
}

.result{
margin-top:20px;
padding:15px;
border:1px solid #1e293b;
}

</style>

</head>

<body>

<h2>UUID → TCP URL Finder</h2>

<h3>Single UUID / VSPL Number Search</h3>

<input id="single_uuid" placeholder="VSPL-140993-JPEVS / VSPL-140993 / 140993">

<button onclick="searchUUID()">Search</button>

<div id="single_result" class="result"></div>

<hr>

<h3>Upload UUID CSV</h3>

<input type="file" id="file">

<br>

<button onclick="upload()">Upload</button>

<a href="/download-matched">
<button>Download Matched CSV</button>
</a>

<h3>Unmatched UUID</h3>

<table id="table">

<tr>
<th>UUID</th>
<th>Number</th>
</tr>

</table>

<br>

<a href="/generate-unmatched">
<button>Generate Unmatched CSV</button>
</a>

<script>


async function searchUUID(){

let uuid = document.getElementById("single_uuid").value

if(!uuid){
alert("Enter UUID")
return
}

let res = await fetch(`/search?uuid=${uuid}`)

let data = await res.json()

let html=""

if(data.error){

html="❌ No Match Found"

}else{

html=`<b>UUID:</b> ${data.uuid}<br>
<b>TCP URL:</b> ${data.tcp_url}<br>
<b>Match Type:</b> ${data.match_type}`

}

document.getElementById("single_result").innerHTML=html

}



async function upload(){

let file=document.getElementById("file").files[0]

if(!file){
alert("Select CSV file")
return
}

let form=new FormData()

form.append("file",file)

let res=await fetch("/upload",{
method:"POST",
body:form
})

let data=await res.json()

let table=document.getElementById("table")

table.innerHTML="<tr><th>UUID</th><th>Number</th></tr>"

data.unmatched.forEach(r=>{

table.innerHTML+=`<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
</tr>`

})

}

</script>

</body>

</html>
